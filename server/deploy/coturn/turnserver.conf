# coturn dev config — host network mode in docker-compose
# Clients use turn:127.0.0.1:3478 with credentials from chatlive rtc-config (future)

listening-port=3478
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=chatlive_turn_dev_secret
realm=chatlive.local
total-quota=100
stale-nonce=600
no-multicast-peers
no-cli
verbose

# Uncomment for production behind public IP:
# external-ip=PUBLIC_IP/LOCAL_IP
