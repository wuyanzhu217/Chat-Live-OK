# coturn dev config — host network mode in docker-compose
# Clients receive ICE servers from GET /v1/calls/{id}/rtc-config

listening-port=3478
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=chatlive_turn_dev_secret
realm=chatlive.local
total-quota=100
stale-nonce=600
no-multicast-peers
no-cli
verbose

# Public IP seen by browsers (must match TURN_HOST in .env)
external-ip=8.154.31.5

# TURN relay media ports — open this UDP range in cloud security group
min-port=49160
max-port=49200

# TCP relay fallback for mobile networks that block UDP
tcp-relay
