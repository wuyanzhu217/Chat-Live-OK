# Included by HTTP/HTTPS server blocks. Set before include:
#   set $gateway_port "8443";
#   set $forwarded_proto "https";

# SRS HLS / HTTP-FLV media only.
# Do NOT use prefix /live/ — that steals Vue routes (/live/watch/..., /live/broadcast/...).
location ~* ^/live/[^/?]+\.(m3u8|ts|flv|aac)(\?.*)?$ {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        add_header Access-Control-Max-Age 86400;
        return 204;
    }
    proxy_pass http://srs_http;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin *;
}

# SRS WHIP / WHEP / HTTP API
location /rtc/ {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        add_header Access-Control-Max-Age 86400;
        return 204;
    }
    proxy_pass http://srs_api/rtc/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Content-Type $http_content_type;
    proxy_pass_request_body on;
    add_header Access-Control-Allow-Origin *;
}

# MinIO media (HTTPS same-origin; avoids mixed content on mobile)
location /media/ {
    proxy_pass http://minio:9000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    add_header Access-Control-Allow-Origin *;
}

# chatlive REST + WebSocket
location /v1/ {
    proxy_pass http://chatlive_http/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
}

location /v1/ws {
    proxy_pass http://chatlive:8089/v1/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_read_timeout 3600s;
}

location /health-chatlive {
    proxy_pass http://chatlive:8088/health;
    proxy_http_version 1.1;
}

# Keycloak OIDC
location /auth/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $keycloak_upstream http://keycloak:8080;
    proxy_pass $keycloak_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $gateway_port;
    proxy_cookie_flags ~ nosecure samesite=lax;
    proxy_hide_header Strict-Transport-Security;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
}

location /health {
    return 200 'chatlive-nginx ok';
    add_header Content-Type text/plain;
}

# Vite dev frontend (single entry via gateway)
location / {
    proxy_pass http://host.docker.internal:5173;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
