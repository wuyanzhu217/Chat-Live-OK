# Local dev gateway — single entry on :8888
#   HLS:  http://127.0.0.1:8888/live/test.m3u8
#   WHIP: http://127.0.0.1:8888/rtc/v1/whip/?app=live&stream=test&token=dev
#   API:  http://127.0.0.1:8888/v1/  (when chatlive is wired)

upstream chatlive_http {
    server chatlive:8088;
}

upstream srs_http {
    server srs:8080;
}

upstream srs_api {
    server srs:1985;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # SRS HLS / HTTP-FLV
    location /live/ {
        proxy_pass http://srs_http/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    # SRS WHIP / WHEP / HTTP API
    location /rtc/ {
        proxy_pass http://srs_api/rtc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $http_content_type;
        proxy_pass_request_body on;
        add_header Access-Control-Allow-Origin *;
    }

    # chatlive REST + WebSocket
    location /v1/ {
        proxy_pass http://chatlive_http/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/ws {
        proxy_pass http://chatlive:8089/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /health-chatlive {
        proxy_pass http://chatlive:8088/health;
        proxy_http_version 1.1;
    }

    # Keycloak OIDC (make dev-up)
    # Issuer: http://127.0.0.1:8888/auth/realms/chatlive
    location /auth/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $keycloak_upstream http://keycloak:8080;
        rewrite ^/auth/?(.*)$ /$1 break;
        proxy_pass $keycloak_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location /health {
        return 200 'chatlive-nginx ok';
        add_header Content-Type text/plain;
    }
}
