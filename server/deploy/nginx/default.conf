# Local dev gateway
#   HTTPS: https://127.0.0.1:8888  (mic/WebRTC secure context)
#   HTTP:  http://127.0.0.1:8888   → 302 自动跳转到 HTTPS
#
#   HLS:  https://127.0.0.1:8888/live/test.m3u8
#   API:  https://127.0.0.1:8888/v1/

map $http_host $https_redirect_host {
    ~^([^:]+):8888$ $1:8888;
    ~^([^:]+):8443$ $1:8888;
    ~^([^:]+):80$   $1:8888;
    ~^([^:]+)$      $1:8888;
    default         $http_host;
}

upstream chatlive_http {
    server chatlive:8088;
}

upstream srs_http {
    server srs:8080;
}

upstream srs_api {
    server srs:1985;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Let's Encrypt http-01 (must stay on plain HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        # HTTP → HTTPS on :8888 (port already open in typical dev security groups)
        return 301 https://$https_redirect_host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    client_max_body_size 20m;
    large_client_header_buffers 4 32k;

    include /etc/nginx/snippets/ssl-certs.conf;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    # Mobile/浏览器误用 http://IP:8888 时，自动跳转到 https://（避免 400）
    error_page 497 https://$http_host$request_uri;

    set $gateway_port "8888";
    set $forwarded_proto "https";

    include /etc/nginx/snippets/chatlive-gateway.conf;
}
