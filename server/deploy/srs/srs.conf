# Chat-Live-OK SRS 6.x configuration
# Docs: docs/architecture/Live-SRS.md
#
# Dev: CANDIDATE env from docker-compose (SRS_CANDIDATE in .env)
# WHIP: http://127.0.0.1:1985/rtc/v1/whip/?app=live&stream=STREAM&token=TOKEN
# HLS:  http://127.0.0.1:8080/live/STREAM.m3u8
# RTMP: rtmp://127.0.0.1:1935/live/STREAM?token=TOKEN

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

rtc_server {
    enabled         on;
    listen          8000;
    candidate       $CANDIDATE;
}

vhost __defaultVhost__ {
    min_latency     on;

    play {
        gop_cache       off;
        queue_length    10;
    }

    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      10;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }

    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    rtc {
        enabled         on;
        rtmp_to_rtc     on;
        rtc_to_rtmp     on;
    }

    http_hooks {
        enabled         on;
        on_publish      http://chatlive:8088/internal/srs/on_publish;
        on_unpublish    http://chatlive:8088/internal/srs/on_unpublish;
    }
}
