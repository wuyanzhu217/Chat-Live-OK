# Chat-Live-OK development stack
# Usage (from repo root):
#   cp server/deploy/.env.example server/deploy/.env
#   make dev-up              # Postgres, Redis, MinIO, SRS, Keycloak, coturn, nginx
#
# Ports:
#   5432  PostgreSQL
#   6380  Redis (host; container internal 6379)
#   9000  MinIO API   9001 Console
#   1935  SRS RTMP
#   1985  SRS HTTP API (WHIP/WHEP signaling)
#   8080  SRS HTTP Server (HLS)
#   8000  SRS WebRTC UDP
#   3478  coturn
#   8081  Keycloak (OIDC / admin)
#   8888  nginx HTTPS gateway (API/HLS/WHIP/auth + Vite proxy) — primary entry
#   8443  nginx HTTPS gateway (alias, same TLS backend)
#   80    nginx HTTP → 301 to https://host:8888

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatlive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatlive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatlive_dev}
      POSTGRES_DB: ${POSTGRES_DB:-chatlive}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/initdb.d/000-keycloak-db.sh:/docker-entrypoint-initdb.d/000-keycloak-db.sh:ro
      - ../migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatlive}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatlive-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: chatlive-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatlive}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatlive_dev_minio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: chatlive-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/$${MINIO_BUCKET} --ignore-existing;
      mc anonymous set download local/$${MINIO_BUCKET};
      echo 'MinIO bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatlive}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatlive_dev_minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-chatlive-media}

  # Dev-only: accepts all SRS publish hooks until chatlive-server is implemented.
  # Replace hook URL with http://chatlive:8088 when real service is ready.
  mock-auth:
    image: nginx:alpine
    container_name: chatlive-mock-auth
    restart: unless-stopped
    volumes:
      - ./mock-auth/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8088"

  srs:
    image: ossrs/srs:6
    container_name: chatlive-srs
    restart: unless-stopped
    environment:
      CANDIDATE: ${SRS_CANDIDATE:-127.0.0.1}
    ports:
      - "1935:1935"       # RTMP
      - "1985:1985"       # HTTP API (WHIP/WHEP)
      - "8080:8080"       # HTTP Server (HLS / HTTP-FLV)
      - "8000:8000/udp"   # WebRTC media
    volumes:
      - ./srs/srs.conf:/usr/local/srs/conf/chatlive.conf:ro
      - srs_data:/usr/local/srs/objs
    command: ["./objs/srs", "-c", "conf/chatlive.conf"]
    depends_on:
      mock-auth:
        condition: service_started

  coturn:
    image: coturn/coturn:latest
    container_name: chatlive-coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

  nginx:
    image: nginx:alpine
    container_name: chatlive-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8888:443"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/acme-webroot:/var/www/certbot:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - srs
      - chatlive

  chatlive:
    build:
      context: ../..
      dockerfile: server/deploy/Dockerfile.chatlive
    container_name: chatlive-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-chatlive}:${POSTGRES_PASSWORD:-chatlive_dev}@postgres:5432/${POSTGRES_DB:-chatlive}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-chatlive}/protocol/openid-connect/certs
      TURN_SECRET: ${TURN_SECRET:-chatlive_turn_dev_secret}
      TURN_REALM: ${TURN_REALM:-chatlive.local}
      TURN_HOST: ${TURN_HOST:-127.0.0.1}
      TURN_PORT: ${TURN_PORT:-3478}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatlive}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatlive_dev_minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-chatlive-media}
      SRS_HOOK_SECRET: dev
    ports:
      - "8088:8088"
      - "8089:8089"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_started

  # chatlive-server was previously a placeholder — now built from Dockerfile.chatlive

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: chatlive-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://127.0.0.1:8888/auth}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev}
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8081}:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 26: health on management port 9000; KC_HTTP_RELATIVE_PATH=/auth
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /auth/health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  srs_data:
