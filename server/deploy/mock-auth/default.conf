# Temporary SRS hook handler for local dev (always allow publish).
# Replace with chatlive-server when POST /internal/srs/on_publish is implemented.
# Then update srs/srs.conf hooks to http://chatlive:8088/internal/srs/...

server {
    listen 8088;
    server_name _;

    location /internal/srs/on_publish {
        default_type application/json;
        return 200 '{"code":0,"message":"ok (mock-auth dev)"}';
    }

    location /internal/srs/on_unpublish {
        default_type application/json;
        return 200 '{"code":0,"message":"ok (mock-auth dev)"}';
    }

    location /health {
        return 200 'ok';
    }
}
